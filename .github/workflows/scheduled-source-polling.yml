name: Scheduled vacancy source polling

on:
  schedule:
    - cron: "7 * * * *"
    - cron: "22 * * * *"
    - cron: "37 * * * *"
    - cron: "52 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: poll-vacancy-sources
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TARGET_CHAT_ID: ${{ secrets.TARGET_CHAT_ID }}
      OPERATOR_USER_IDS: ${{ secrets.OPERATOR_USER_IDS }}
      FORWARDED_MODE: normalize
      DATABASE_PATH: data/vacancies.sqlite3
      APPLICATION_QUEUE_ENABLED: ${{ secrets.APPLICATION_QUEUE_ENABLED || 'false' }}
      APPLICATION_AUTO_SUBMIT: ${{ secrets.APPLICATION_AUTO_SUBMIT || 'false' }}
      APPLICATION_ALLOWED_DOMAINS: ${{ secrets.APPLICATION_ALLOWED_DOMAINS || 'arbeitnow.com' }}
      APPLICATION_QUEUE_PROFILE_FULL_NAME: ${{ secrets.APPLICATION_QUEUE_PROFILE_FULL_NAME }}
      APPLICATION_QUEUE_PROFILE_EMAIL: ${{ secrets.APPLICATION_QUEUE_PROFILE_EMAIL }}
      APPLICATION_QUEUE_PROFILE_PHONE: ${{ secrets.APPLICATION_QUEUE_PROFILE_PHONE }}
      APPLICATION_QUEUE_PROFILE_PERSONAL_URL: ${{ secrets.APPLICATION_QUEUE_PROFILE_PERSONAL_URL }}
      APPLICATION_QUEUE_PROFILE_COVER_LETTER: ${{ secrets.APPLICATION_QUEUE_PROFILE_COVER_LETTER }}
      # Optional bootstrap fallback; normal updates arrive as /queue_resume documents.
      APPLICATION_QUEUE_RESUME_FILE_ID: ${{ secrets.APPLICATION_QUEUE_RESUME_FILE_ID }}
      APPLICATION_QUEUE_RESUME_FILE_NAME: ${{ secrets.APPLICATION_QUEUE_RESUME_FILE_NAME || 'resume.pdf' }}
      SOURCE_POLL_INTERVAL_SECONDS: "0"
      SOURCE_MAX_PUBLISH_PER_POLL: ${{ secrets.SOURCE_MAX_PUBLISH_PER_POLL || '20' }}
      SOURCE_MAX_AGE_HOURS: ${{ secrets.SOURCE_MAX_AGE_HOURS || '48' }}
      ENABLE_ARBEITNOW: "true"
      ENABLE_WORKING_NOMADS: "true"
      ENABLE_LINKEDIN_POST_SEARCH: ${{ secrets.ENABLE_LINKEDIN_POST_SEARCH || 'false' }}
      SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
      SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
      LINKEDIN_POST_SEARCH_QUERY: ${{ secrets.LINKEDIN_POST_SEARCH_QUERY || '(site:linkedin.com/posts OR site:linkedin.com/feed/update) ("we are hiring" OR hiring OR "ищем" OR "ищет") (frontend OR backend OR developer OR engineer OR react OR python OR разработчик OR инженер)' }}
      LINKEDIN_POST_SEARCH_RESULTS_WANTED: ${{ secrets.LINKEDIN_POST_SEARCH_RESULTS_WANTED || '10' }}
      ENABLE_LINKEDIN_POST_SCRAPER: ${{ secrets.ENABLE_LINKEDIN_POST_SCRAPER || 'false' }}
      LINKEDIN_POST_SCRAPER_QUERY: ${{ secrets.LINKEDIN_POST_SCRAPER_QUERY || '(site:linkedin.com/posts OR site:linkedin.com/feed/update) ("we are hiring" OR hiring OR "ищем" OR "ищет") (frontend OR backend OR developer OR engineer OR react OR python OR разработчик OR инженер)' }}
      LINKEDIN_POST_SCRAPER_SEARCH_PROVIDERS: ${{ secrets.LINKEDIN_POST_SCRAPER_SEARCH_PROVIDERS || 'bing_rss,duckduckgo,bing' }}
      LINKEDIN_POST_SCRAPER_RESULTS_WANTED: ${{ secrets.LINKEDIN_POST_SCRAPER_RESULTS_WANTED || '100' }}
      ENABLE_LINKEDIN_POST_HEADLESS: ${{ secrets.ENABLE_LINKEDIN_POST_HEADLESS || 'false' }}
      LINKEDIN_HEADLESS_ACCESS_AUTHORIZED: ${{ secrets.LINKEDIN_HEADLESS_ACCESS_AUTHORIZED || 'false' }}
      LINKEDIN_HEADLESS_PERMISSION_REFERENCE: ${{ secrets.LINKEDIN_HEADLESS_PERMISSION_REFERENCE }}
      LINKEDIN_POST_HEADLESS_QUERY: ${{ secrets.LINKEDIN_POST_HEADLESS_QUERY }}
      LINKEDIN_POST_HEADLESS_RESULTS_WANTED: ${{ secrets.LINKEDIN_POST_HEADLESS_RESULTS_WANTED || '10' }}
      LINKEDIN_POST_SEARCH_INTENTS_PER_CYCLE: ${{ secrets.LINKEDIN_POST_SEARCH_INTENTS_PER_CYCLE || '6' }}
      LINKEDIN_POST_HEADLESS_TIMEOUT_SECONDS: ${{ secrets.LINKEDIN_POST_HEADLESS_TIMEOUT_SECONDS || '20' }}
      # Source vacancies always pass through localization before publication.
      LOCALIZE_DESCRIPTIONS: "true"
      LOCALIZATION_PROVIDER: ${{ secrets.LOCALIZATION_PROVIDER || 'openai' }}
      LOCALIZATION_MAX_PER_POLL: ${{ secrets.LOCALIZATION_MAX_PER_POLL || '20' }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL || 'gpt-4.1-mini' }}
      OPENAI_FALLBACK_MODELS: ${{ secrets.OPENAI_FALLBACK_MODELS }}
      OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      GROQ_MODEL: ${{ secrets.GROQ_MODEL || 'llama-3.1-8b-instant' }}
      GROQ_FALLBACK_MODELS: ${{ secrets.GROQ_FALLBACK_MODELS || 'openai/gpt-oss-20b' }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Restore deduplication database
        uses: actions/cache@v5
        with:
          path: data/
          key: vacancy-db-${{ github.run_id }}
          restore-keys: |
            vacancy-db-

      - name: Install bot
        run: pip install .

      - name: Install Chromium for browser-backed sources or applications
        if: (env.ENABLE_LINKEDIN_POST_HEADLESS == 'true' && env.LINKEDIN_HEADLESS_ACCESS_AUTHORIZED == 'true' && env.LINKEDIN_HEADLESS_PERMISSION_REFERENCE != '') || env.APPLICATION_QUEUE_ENABLED == 'true'
        run: python -m playwright install --with-deps chromium

      - name: Verify production card formatting
        run: |
          python - <<'PY'
          from tg_vacancy_bot.formatting import format_vacancy_card
          from tg_vacancy_bot.models import Vacancy

          card = format_vacancy_card(
              Vacancy(
                  title="Senior Backend Engineer",
                  description="Build APIs.",
                  source="Format check",
                  location="Remote",
                  stack=("Python", "FastAPI"),
              )
          )
          assert "IT Job Board" not in card
          assert "<b>\u041b\u043e\u043a\u0430\u0446\u0438\u044f</b>" in card
          assert "<b>\u0421\u0442\u0435\u043a</b>" in card
          PY

      - name: Poll and publish new vacancies
        run: tg-vacancy-bot poll-once

      - name: Diagnose application queue without consuming updates
        if: ${{ always() && env.APPLICATION_QUEUE_ENABLED == 'true' }}
        run: tg-vacancy-bot diagnose-application-queue

      - name: Process queued application clicks
        if: ${{ always() && env.APPLICATION_QUEUE_ENABLED == 'true' }}
        run: tg-vacancy-bot process-applications-once
