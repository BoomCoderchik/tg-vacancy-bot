name: Scheduled vacancy source polling

on:
  schedule:
    - cron: "7 * * * *"
    - cron: "22 * * * *"
    - cron: "37 * * * *"
    - cron: "52 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: poll-vacancy-sources
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TARGET_CHAT_ID: ${{ secrets.TARGET_CHAT_ID }}
      OPERATOR_USER_IDS: ${{ secrets.OPERATOR_USER_IDS }}
      FORWARDED_MODE: normalize
      DATABASE_PATH: data/vacancies.sqlite3
      SOURCE_POLL_INTERVAL_SECONDS: "0"
      SOURCE_MAX_PUBLISH_PER_POLL: ${{ secrets.SOURCE_MAX_PUBLISH_PER_POLL || '20' }}
      SOURCE_MAX_AGE_HOURS: ${{ secrets.SOURCE_MAX_AGE_HOURS || '48' }}
      ENABLE_ARBEITNOW: "true"
      ENABLE_LINKEDIN_POST_SEARCH: ${{ secrets.ENABLE_LINKEDIN_POST_SEARCH || 'false' }}
      SERPAPI_API_KEY: ${{ secrets.SERPAPI_API_KEY }}
      SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
      LINKEDIN_POST_SEARCH_QUERY: ${{ secrets.LINKEDIN_POST_SEARCH_QUERY || '(site:linkedin.com/posts OR site:linkedin.com/feed/update) ("we are hiring" OR hiring OR "ищем" OR "ищет") (frontend OR backend OR developer OR engineer OR react OR python OR разработчик OR инженер)' }}
      LINKEDIN_POST_SEARCH_RESULTS_WANTED: ${{ secrets.LINKEDIN_POST_SEARCH_RESULTS_WANTED || '10' }}
      ENABLE_LINKEDIN_POST_SCRAPER: ${{ secrets.ENABLE_LINKEDIN_POST_SCRAPER || 'true' }}
      LINKEDIN_POST_SCRAPER_QUERY: ${{ secrets.LINKEDIN_POST_SCRAPER_QUERY || '(site:linkedin.com/posts OR site:linkedin.com/feed/update) ("we are hiring" OR hiring OR "ищем" OR "ищет") (frontend OR backend OR developer OR engineer OR react OR python OR разработчик OR инженер)' }}
      LINKEDIN_POST_SCRAPER_SEARCH_PROVIDERS: ${{ secrets.LINKEDIN_POST_SCRAPER_SEARCH_PROVIDERS || 'duckduckgo,bing' }}
      LINKEDIN_POST_SCRAPER_RESULTS_WANTED: ${{ secrets.LINKEDIN_POST_SCRAPER_RESULTS_WANTED || '100' }}
      ENABLE_LINKEDIN_POST_HEADLESS: ${{ secrets.ENABLE_LINKEDIN_POST_HEADLESS || 'false' }}
      LINKEDIN_POST_HEADLESS_QUERY: ${{ secrets.LINKEDIN_POST_HEADLESS_QUERY || '(site:linkedin.com/posts OR site:linkedin.com/feed/update) ("we are hiring" OR hiring OR "ищем" OR "ищет") (frontend OR backend OR developer OR engineer OR react OR python OR разработчик OR инженер)' }}
      LINKEDIN_POST_HEADLESS_RESULTS_WANTED: ${{ secrets.LINKEDIN_POST_HEADLESS_RESULTS_WANTED || '10' }}
      LINKEDIN_POST_HEADLESS_TIMEOUT_SECONDS: ${{ secrets.LINKEDIN_POST_HEADLESS_TIMEOUT_SECONDS || '20' }}
      # Public-source polling never invokes a translation model.
      LOCALIZE_DESCRIPTIONS: "false"

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Restore deduplication database
        uses: actions/cache@v5
        with:
          path: data/
          key: vacancy-db-${{ github.run_id }}
          restore-keys: |
            vacancy-db-

      - name: Install bot
        run: pip install .

      - name: Install Chromium for optional LinkedIn headless source
        if: env.ENABLE_LINKEDIN_POST_HEADLESS == 'true'
        run: python -m playwright install --with-deps chromium

      - name: Verify production card formatting
        run: |
          python - <<'PY'
          from tg_vacancy_bot.formatting import format_vacancy_card
          from tg_vacancy_bot.models import Vacancy

          card = format_vacancy_card(
              Vacancy(
                  title="Senior Backend Engineer",
                  description="Build APIs.",
                  source="Format check",
                  location="Remote",
                  stack=("Python", "FastAPI"),
              )
          )
          assert "IT Job Board" not in card
          assert "<b>\u041b\u043e\u043a\u0430\u0446\u0438\u044f</b>" in card
          assert "<b>\u0421\u0442\u0435\u043a</b>" in card
          PY

      - name: Poll and publish new vacancies
        run: tg-vacancy-bot poll-once
